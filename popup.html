<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reel Interpreter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header>
        <h1>Reel Interpreter</h1>
        <button id="settings-toggle" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </header>

      <!-- Settings Panel (hidden by default) -->
      <div id="settings-panel" class="hidden">
        <div class="setting-group">
          <label for="api-key">Groq API Key</label>
          <input type="password" id="api-key" placeholder="Enter your API key" />

          <button id="save-key" class="btn btn-sm">Save</button>
          <p id="key-status" class="status-text"></p>
        </div>
      </div>

      <!-- Main Action -->
      <div id="main-section">
        <p class="hint">Navigate to any Instagram Reel or TikTok, then:</p>

        <button id="interpret-btn" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
          Interpret This Reel
        </button>

        <label class="checkbox-label disabled-label" id="capture-audio-label">
          <input type="checkbox" id="capture-audio" disabled />
          <span>Capture audio <span class="coming-soon">coming soon</span></span>
        </label>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p id="loading-text">Capturing reel...</p>
      </div>

      <!-- Error -->
      <div id="error" class="hidden">
        <p id="error-text"></p>
      </div>

      <!-- Results -->
      <div id="results" class="hidden">
        <!-- Badges -->
        <div id="badges" class="badges"></div>

        <!-- Translations -->
        <div class="result-card">
          <h3>Translations</h3>
          <div class="field">
            <span class="field-label">Literal</span>
            <p id="literal-translation"></p>
          </div>
          <div class="divider"></div>
          <div class="field">
            <span class="field-label">Natural</span>
            <p id="natural-translation"></p>
          </div>
        </div>

        <!-- Word Breakdown -->
        <div id="breakdown-card" class="result-card hidden">
          <h3>Word Breakdown</h3>
          <div id="breakdown-list"></div>
        </div>

        <!-- Meaning -->
        <div class="result-card">
          <h3>Meaning & Context</h3>
          <div class="field">
            <span class="field-label">Combined Meaning</span>
            <p id="combined-meaning"></p>
          </div>
          <div id="context-section">
            <div class="divider"></div>
            <div class="field">
              <span class="field-label">Context</span>
              <p id="context-explanation"></p>
            </div>
          </div>
        </div>

        <!-- Slang -->
        <div id="slang-card" class="result-card">
          <h3>Slang Breakdown</h3>
          <p id="slang-explanation"></p>
        </div>

        <!-- Why it's funny -->
        <div id="funny-card" class="result-card">
          <h3>Why It Works</h3>
          <p id="funny-explanation"></p>
        </div>

        <!-- Vocabulary -->
        <div id="vocab-card" class="result-card">
          <h3>Key Vocabulary</h3>
          <div id="vocab-list"></div>
        </div>

        <!-- Interpret Again -->
        <button id="again-btn" class="btn btn-primary">
          Interpret Another Reel
        </button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
